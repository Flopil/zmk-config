# Uncomment the following lines to enable the Corne RGB Underglow
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y

# Uncomment the following line to enable the Corne OLED Display
# CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=y

CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_ZMK_RGB_KEYBOARD=y

CONFIG_LED_STRIP=y
CONFIG_WS2812_STRIP=y

CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_USB=y
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y
CONFIG_ZMK_RGB_UNDERGLOW_BRT_STEP=8
CONFIG_ZMK_RGB_KEYBOARD_HUE_STEP=10
CONFIG_ZMK_RGB_KEYBOARD_SAT_STEP=10

CONFIG_ZMK_RGB_UNDERGLOW_EFF_BREATHE=y
CONFIG_ZMK_RGB_UNDERGLOW_EFF_RAINBOW=y
